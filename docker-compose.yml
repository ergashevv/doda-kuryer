services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: doda
      POSTGRES_PASSWORD: doda
      POSTGRES_DB: doda
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doda -d doda"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
